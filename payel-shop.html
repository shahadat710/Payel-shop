<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0A1628"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Payel Shop</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0A1628;color:#F0F0F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

/* Login */
#loginScreen{position:fixed;inset:0;background:#0A1628;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;padding:24px;}
#loginScreen h2{color:#FFD700;font-size:24px;font-weight:800;text-align:center;}
#loginScreen p{color:#888;font-size:13px;text-align:center;}
.login-input{width:100%;max-width:300px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:15px;color:#fff;font-size:16px;outline:none;}
.login-input:focus{border-color:#FFD700;}
#loginError{color:#E74C3C;font-size:13px;display:none;}
.login-btn{width:100%;max-width:300px;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:14px;padding:15px;color:#0A1628;font-size:16px;font-weight:800;cursor:pointer;}
.view-btn{width:100%;max-width:300px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:13px;color:#888;font-size:14px;cursor:pointer;}

/* Notif */
#notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1E8449;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:9999;white-space:nowrap;}
#notifErr{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#C0392B;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:9999;white-space:nowrap;}

/* Header */
.header{background:linear-gradient(135deg,#0A1628,#1A2F4A);padding:14px 16px;border-bottom:1px solid #1E3A5F;position:sticky;top:0;z-index:10;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.header h1{font-size:18px;font-weight:800;color:#FFD700;}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.hbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 10px;color:#888;font-size:11px;font-weight:700;cursor:pointer;}
.lock-btn{background:rgba(255,255,255,0.06);border:none;border-radius:8px;padding:6px 12px;color:#888;font-size:12px;cursor:pointer;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px;}
.stat-box{background:#0F1E35;border:1px solid #1E3A5F;border-radius:12px;padding:10px 6px;text-align:center;}
.stat-val{font-size:16px;font-weight:800;color:#FFD700;}
.stat-lbl{font-size:10px;color:#666;margin-top:2px;}

/* Tabs */
.tabs{padding:0 12px 8px;}
.tab-bar{display:flex;background:#0F1E35;border-radius:12px;padding:4px;gap:4px;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;border:none;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:#888;transition:all 0.2s;white-space:nowrap;}

/* Cards */
.content-area{padding:0 12px 90px;}
.product-card{background:#0F1E35;border:1px solid #1E3A5F;border-radius:16px;margin-bottom:10px;overflow:hidden;}
.product-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.product-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.product-info{flex:1;}
.product-name{font-size:15px;font-weight:700;color:#F0F0F0;}
.product-cat{font-size:11px;color:#888;margin-top:2px;}
.product-price{font-size:13px;color:#FFD700;font-weight:700;margin-top:2px;}
.stock-badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:700;}
.stock-ok{background:rgba(39,174,96,0.2);color:#27AE60;border:1px solid #27AE60;}
.stock-low{background:rgba(231,76,60,0.2);color:#E74C3C;border:1px solid #E74C3C;}
.stock-zero{background:rgba(150,150,150,0.2);color:#aaa;border:1px solid #555;}

.sale-card{background:#0F1E35;border:1px solid #1E3A5F;border-radius:14px;margin-bottom:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.sale-date{background:#1A3050;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;color:#FFD700;text-align:center;min-width:52px;flex-shrink:0;}
.sale-info{flex:1;}
.sale-product{font-size:14px;font-weight:700;}
.sale-detail{font-size:12px;color:#888;margin-top:2px;}
.sale-amount{font-size:15px;font-weight:800;color:#27AE60;}
.sale-profit{font-size:11px;color:#3498DB;margin-top:1px;text-align:right;}

/* Date filter */
.date-dropdowns{display:flex;gap:8px;padding:8px 12px 4px;}
.date-select{flex:1;background:#0F1E35;border:1px solid #1E3A5F;border-radius:12px;padding:10px 8px;color:#F0F0F0;font-size:13px;font-weight:600;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center;text-align-last:center;}
.date-select:focus{border-color:#FFD700;}

/* Search */
.search-wrap{padding:6px 12px 4px;}
.search-wrap-inner{position:relative;}
.search-input{width:100%;background:#0F1E35;border:1px solid #1E3A5F;border-radius:12px;padding:11px 16px 11px 40px;color:#F0F0F0;font-size:14px;outline:none;}
.search-input:focus{border-color:#FFD700;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}

/* Add btn */
.add-btn{width:100%;background:rgba(255,215,0,0.08);border:1px dashed #FFD700;border-radius:14px;padding:14px;color:#FFD700;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal{background:#0F1E35;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;color:#FFD700;}
.modal label{font-size:12px;color:#888;display:block;margin-bottom:4px;margin-top:12px;}
.modal input,.modal select,.modal textarea{width:100%;background:#0A1628;border:1px solid #1E3A5F;border-radius:10px;padding:12px;color:#F0F0F0;font-size:14px;outline:none;}
.modal textarea{resize:none;height:60px;}
.modal input:focus,.modal select:focus{border-color:#FFD700;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;background:#1A2F4A;border:none;border-radius:10px;padding:12px;color:#888;font-size:14px;cursor:pointer;}
.btn-primary{flex:2;background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:12px;color:#0A1628;font-size:14px;font-weight:700;cursor:pointer;}
.btn-danger{flex:1;background:rgba(231,76,60,0.2);border:1px solid #E74C3C;border-radius:10px;padding:12px;color:#E74C3C;font-size:14px;cursor:pointer;}

/* Preview box */
.calc-box{background:#080F1E;border:1px solid #1E3A5F;border-radius:12px;padding:12px;margin-top:12px;}
.calc-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.calc-row .lbl{color:#888;}
.calc-row .val{font-weight:600;}
.calc-row .green{color:#27AE60;}
.calc-row .red{color:#E74C3C;}
.calc-row .gold{color:#FFD700;font-weight:800;}

/* Due badge */
.due-badge{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:700;background:rgba(230,126,34,0.2);color:#E67E22;border:1px solid #E67E22;}
.paid-badge-green{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:700;background:rgba(39,174,96,0.2);color:#27AE60;border:1px solid #27AE60;}

/* Report grid */
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.rep-box{background:#080F1E;border-radius:10px;padding:10px;text-align:center;}
.rep-val{font-size:18px;font-weight:800;color:#FFD700;}
.rep-lbl{font-size:10px;color:#888;margin-top:2px;}

select option{background:#0F1E35;}
</style>
</head>
<body>

<div id="notif"></div>
<div id="notifErr"></div>

<!-- Login Screen -->
<div id="loginScreen">
  <div style="font-size:60px;line-height:1">💡</div>
  <h2>Payel Shop</h2>
  <p>Lights & Accessories Tracker</p>
  <div style="position:relative;width:100%;max-width:300px;">
    <input type="password" class="login-input" id="passInput" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()" style="padding-right:48px;"/>
    <button onclick="toggleEye('passInput','eyeBtn')" id="eyeBtn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:18px;cursor:pointer;">👁️</button>
  </div>
  <div id="loginError">❌ Wrong Password!</div>
  <button class="login-btn" onclick="tryLogin()">🔐 Login</button>
  <button class="view-btn" onclick="viewOnly()">👁 View Only</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── FIREBASE CONFIG — Replace with Payel's own config ──
const firebaseConfig = {
  apiKey: "AIzaSyBji9ny612NL9KLvLvnA-Uc8OsKZOklBxI",
  authDomain: "payel-shop.firebaseapp.com",
  databaseURL: "https://payel-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "payel-shop",
  storageBucket: "payel-shop.firebasestorage.app",
  messagingSenderId: "858295307749",
  appId: "1:858295307749:web:aac929ac2e84314b72330c",
  measurementId: "G-P3RTRJDP71"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── State ──
let isEditor = sessionStorage.getItem("shopAuth") === "editor";
let isViewer = sessionStorage.getItem("shopAuth") === "viewer";
let PASS = "payel123";
let passLoaded = false;
let currentTab = "products";
let products = [];
let sales = [];
let dues = [];
let selectedYear = new Date().getFullYear();
let selectedMonthNum = new Date().getMonth() + 1;

// modals
let addProductOpen = false;
let editProduct = null;
let addSaleOpen = false;
let editSale = null;
let addDueOpen = false;

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTH_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const CATEGORIES = ["LED Strip","Bulb","Ceiling Light","Wall Light","Spotlight","Chandelier","Outdoor Light","Switch & Socket","Cable & Wire","Accessories","Other"];
const CAT_ICONS = {"LED Strip":"💡","Bulb":"💡","Ceiling Light":"🔆","Wall Light":"🕯️","Spotlight":"🔦","Chandelier":"✨","Outdoor Light":"🌟","Switch & Socket":"🔌","Cable & Wire":"🔋","Accessories":"🛒","Other":"📦"};

// ── Firebase Password ──
db.ref("shop_settings/password").on("value", snap => {
  const v = snap.val();
  if (v) PASS = v;
  passLoaded = true;
});
setTimeout(() => { passLoaded = true; }, 3000);

// ── Firebase Data ──
db.ref("shop_products").on("value", snap => {
  products = snap.val() ? Object.values(snap.val()) : [];
  renderAll();
});
db.ref("shop_sales").on("value", snap => {
  sales = snap.val() ? Object.values(snap.val()) : [];
  renderAll();
});
db.ref("shop_dues").on("value", snap => {
  dues = snap.val() ? Object.values(snap.val()) : [];
  renderAll();
});

if (isEditor || isViewer) {
  document.getElementById("loginScreen").style.display = "none";
}

function tryLogin() {
  const v = document.getElementById("passInput").value;
  if (v === PASS) {
    isEditor = true;
    sessionStorage.setItem("shopAuth","editor");
    document.getElementById("loginScreen").style.display = "none";
    renderAll();
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}
function viewOnly() {
  isViewer = true;
  sessionStorage.setItem("shopAuth","viewer");
  document.getElementById("loginScreen").style.display = "none";
  renderAll();
}
function logout() {
  sessionStorage.removeItem("shopAuth");
  isEditor = false; isViewer = false;
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("passInput").value = "";
  document.getElementById("loginError").style.display = "none";
}
function checkEditor() {
  if (!isEditor) { showErr("View only mode!"); return false; }
  return true;
}
function toggleEye(inputId, btnId) {
  const el = document.getElementById(inputId);
  el.type = el.type === "password" ? "text" : "password";
}

function showNotif(msg) {
  const el = document.getElementById("notif");
  el.textContent = msg; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 2500);
}
function showErr(msg) {
  const el = document.getElementById("notifErr");
  el.textContent = "❌ " + msg; el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 2500);
}

function getSelectedMonth() {
  return `${selectedYear}-${String(selectedMonthNum).padStart(2,"0")}`;
}
function getMonthLabel(key) {
  if (!key) return "";
  const [y, m] = key.split("-");
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}

// ── TABS ──
function setTab(t) {
  currentTab = t;
  document.querySelectorAll(".tab-btn").forEach(b => {
    const active = b.dataset.tab === t;
    b.style.background = active ? "#FFD700" : "transparent";
    b.style.color = active ? "#0A1628" : "#888";
  });
  renderAll();
}

// ── PRODUCT FUNCTIONS ──
function openAddProduct() {
  if (!checkEditor()) return;
  addProductOpen = true;
  setTimeout(() => {
    const fields = ["pName","pCategory","pBuyPrice","pSellPrice","pStock","pUnit","pBarcode","pNotes"];
    fields.forEach(id => { const el = document.getElementById(id); if(el) el.value = id==="pCategory"?"LED Strip":id==="pUnit"?"pcs":""; });
    updateProductCalc();
  }, 50);
  renderAll();
}
function closeProductModal() {
  addProductOpen = false; editProduct = null; renderAll();
}
function doAddProduct() {
  const name = document.getElementById("pName").value.trim();
  const category = document.getElementById("pCategory").value;
  const buyPrice = parseFloat(document.getElementById("pBuyPrice").value) || 0;
  const sellPrice = parseFloat(document.getElementById("pSellPrice").value) || 0;
  const stock = parseInt(document.getElementById("pStock").value) || 0;
  const unit = document.getElementById("pUnit").value || "pcs";
  const barcode = document.getElementById("pBarcode").value.trim();
  const notes = document.getElementById("pNotes").value.trim();
  if (!name) { showErr("Product name required!"); return; }
  if (sellPrice <= 0) { showErr("Selling price required!"); return; }
  const id = Date.now().toString();
  const product = { id, name, category, buyPrice, sellPrice, stock, unit, barcode, notes, createdAt: new Date().toISOString() };
  db.ref(`shop_products/${id}`).set(product);
  addProductOpen = false;
  showNotif(`✅ ${name} added!`);
  renderAll();
}
function openEditProduct(id) {
  if (!checkEditor()) return;
  editProduct = products.find(p => p.id === id);
  if (!editProduct) return;
  setTimeout(() => {
    document.getElementById("epName").value = editProduct.name || "";
    document.getElementById("epCategory").value = editProduct.category || "LED Strip";
    document.getElementById("epBuyPrice").value = editProduct.buyPrice || "";
    document.getElementById("epSellPrice").value = editProduct.sellPrice || "";
    document.getElementById("epStock").value = editProduct.stock || 0;
    document.getElementById("epUnit").value = editProduct.unit || "pcs";
    document.getElementById("epBarcode").value = editProduct.barcode || "";
    document.getElementById("epNotes").value = editProduct.notes || "";
    updateEditProductCalc();
  }, 50);
  renderAll();
}
function doEditProduct() {
  const name = document.getElementById("epName").value.trim();
  const category = document.getElementById("epCategory").value;
  const buyPrice = parseFloat(document.getElementById("epBuyPrice").value) || 0;
  const sellPrice = parseFloat(document.getElementById("epSellPrice").value) || 0;
  const stock = parseInt(document.getElementById("epStock").value) || 0;
  const unit = document.getElementById("epUnit").value || "pcs";
  const barcode = document.getElementById("epBarcode").value.trim();
  const notes = document.getElementById("epNotes").value.trim();
  if (!name) { showErr("Name required!"); return; }
  const updated = { ...editProduct, name, category, buyPrice, sellPrice, stock, unit, barcode, notes };
  db.ref(`shop_products/${editProduct.id}`).set(updated);
  editProduct = null;
  showNotif("✅ Product updated!");
  renderAll();
}
function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;
  db.ref(`shop_products/${id}`).remove();
  showNotif("🗑️ Product deleted");
}
function updateProductCalc() {
  const buy = parseFloat(document.getElementById("pBuyPrice")?.value) || 0;
  const sell = parseFloat(document.getElementById("pSellPrice")?.value) || 0;
  const profit = sell - buy;
  const margin = buy > 0 ? ((profit / sell) * 100).toFixed(1) : 0;
  const el = document.getElementById("productCalcBox");
  if (el) el.innerHTML = `
    <div class="calc-row"><span class="lbl">Buy Price</span><span class="val">AED ${buy.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Sell Price</span><span class="val">AED ${sell.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Profit/Unit</span><span class="val ${profit>=0?'green':'red'}">${profit>=0?'+':''}AED ${profit.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Margin</span><span class="val gold">${margin}%</span></div>`;
}
function updateEditProductCalc() {
  const buy = parseFloat(document.getElementById("epBuyPrice")?.value) || 0;
  const sell = parseFloat(document.getElementById("epSellPrice")?.value) || 0;
  const profit = sell - buy;
  const margin = buy > 0 ? ((profit / sell) * 100).toFixed(1) : 0;
  const el = document.getElementById("editProductCalcBox");
  if (el) el.innerHTML = `
    <div class="calc-row"><span class="lbl">Buy Price</span><span class="val">AED ${buy.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Sell Price</span><span class="val">AED ${sell.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Profit/Unit</span><span class="val ${profit>=0?'green':'red'}">${profit>=0?'+':''}AED ${profit.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Margin</span><span class="val gold">${margin}%</span></div>`;
}
function adjustStock(id, delta) {
  if (!checkEditor()) return;
  const p = products.find(x => x.id === id);
  if (!p) return;
  const newStock = Math.max(0, (p.stock || 0) + delta);
  db.ref(`shop_products/${id}/stock`).set(newStock);
  showNotif(`Stock: ${newStock} ${p.unit || 'pcs'}`);
}

// ── SALE FUNCTIONS ──
function openAddSale() {
  if (!checkEditor()) return;
  addSaleOpen = true;
  setTimeout(() => {
    document.getElementById("sDate").value = new Date().toISOString().split("T")[0];
    document.getElementById("sProduct").value = "";
    document.getElementById("sQty").value = "1";
    document.getElementById("sDiscount").value = "0";
    document.getElementById("sPayment").value = "cash";
    document.getElementById("sCustomer").value = "";
    document.getElementById("sSaleNotes").value = "";
    updateSaleCalc();
  }, 50);
  renderAll();
}
function closeSaleModal() {
  addSaleOpen = false; editSale = null; renderAll();
}
function updateSaleCalc() {
  const pid = document.getElementById("sProduct")?.value;
  const qty = parseInt(document.getElementById("sQty")?.value) || 1;
  const discount = parseFloat(document.getElementById("sDiscount")?.value) || 0;
  const product = products.find(p => p.id === pid);
  const el = document.getElementById("saleCalcBox");
  if (!el) return;
  if (!product) { el.innerHTML = `<div style="color:#555;font-size:12px;text-align:center;">Select a product to see details</div>`; return; }
  const subtotal = product.sellPrice * qty;
  const discountAmt = discount;
  const total = Math.max(0, subtotal - discountAmt);
  const cost = (product.buyPrice || 0) * qty;
  const profit = total - cost;
  el.innerHTML = `
    <div class="calc-row"><span class="lbl">Unit Price</span><span class="val">AED ${product.sellPrice.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Qty × ${qty}</span><span class="val">AED ${subtotal.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Discount</span><span class="val red">- AED ${discountAmt.toFixed(2)}</span></div>
    <div style="border-top:1px solid #1E3A5F;margin:6px 0;"></div>
    <div class="calc-row"><span class="lbl" style="color:#FFD700;font-weight:700;">Total</span><span class="val gold">AED ${total.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Profit</span><span class="val ${profit>=0?'green':'red'}">${profit>=0?'+':''}AED ${profit.toFixed(2)}</span></div>
    <div class="calc-row"><span class="lbl">Stock Left</span><span class="val">${(product.stock||0) - qty >= 0 ? (product.stock||0)-qty : '<span style="color:#E74C3C">⚠️ Insufficient</span>'} ${product.unit||'pcs'}</span></div>`;
}
function doAddSale() {
  const pid = document.getElementById("sProduct").value;
  const qty = parseInt(document.getElementById("sQty").value) || 1;
  const discount = parseFloat(document.getElementById("sDiscount").value) || 0;
  const payment = document.getElementById("sPayment").value;
  const customer = document.getElementById("sCustomer").value.trim();
  const notes = document.getElementById("sSaleNotes").value.trim();
  const dateVal = document.getElementById("sDate").value;
  const product = products.find(p => p.id === pid);
  if (!product) { showErr("Select a product!"); return; }
  if (qty <= 0) { showErr("Qty must be > 0"); return; }
  const subtotal = product.sellPrice * qty;
  const total = Math.max(0, subtotal - discount);
  const cost = (product.buyPrice || 0) * qty;
  const profit = total - cost;
  const saleDate = dateVal || new Date().toISOString().split("T")[0];
  const monthKey = saleDate.slice(0, 7);
  const id = Date.now().toString();
  const sale = { id, productId: product.id, productName: product.name, category: product.category, qty, unitPrice: product.sellPrice, discount, total, cost, profit, payment, customer, notes, date: saleDate, monthKey };
  db.ref(`shop_sales/${id}`).set(sale);
  // Update stock
  const newStock = Math.max(0, (product.stock || 0) - qty);
  db.ref(`shop_products/${product.id}/stock`).set(newStock);
  // If due/credit — add to dues
  if (payment === "due") {
    const dueId = Date.now().toString() + "d";
    db.ref(`shop_dues/${dueId}`).set({ id: dueId, saleId: id, customer: customer || "Unknown", amount: total, paid: 0, date: saleDate, monthKey, status: "pending", notes });
  }
  addSaleOpen = false;
  showNotif(`✅ Sale saved! AED ${total.toFixed(2)}`);
  renderAll();
}

// ── BACKUP / RESTORE ──
function backupData() {
  const data = { version: 1, exportedAt: new Date().toISOString(), products, sales, dues };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `payel-shop-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
  URL.revokeObjectURL(url);
  showNotif("💾 Backup downloaded!");
}
function restoreData() {
  document.getElementById("restoreInput").value = "";
  document.getElementById("restoreInput").click();
}
function handleRestore(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.products || !data.sales) { showErr("Invalid backup file!"); return; }
      if (!confirm("This will replace ALL data. Continue?")) return;
      const pObj = {}; data.products.forEach(p => { pObj[p.id] = p; });
      const sObj = {}; data.sales.forEach(s => { sObj[s.id] = s; });
      db.ref("shop_products").set(Object.keys(pObj).length ? pObj : null);
      db.ref("shop_sales").set(Object.keys(sObj).length ? sObj : null);
      if (data.dues) { const dObj = {}; data.dues.forEach(d => { dObj[d.id] = d; }); db.ref("shop_dues").set(Object.keys(dObj).length ? dObj : null); }
      showNotif("✅ Restore successful!");
    } catch(err) { showErr("Could not read file!"); }
  };
  reader.readAsText(file);
}

// ── EXPORT CSV ──
function exportCSV() {
  const monthSales = sales.filter(s => s.monthKey === getSelectedMonth());
  if (!monthSales.length) { showErr("No sales this month!"); return; }
  const rows = [["Date","Product","Category","Qty","Unit Price","Discount","Total","Cost","Profit","Payment","Customer","Notes"]];
  monthSales.forEach(s => {
    rows.push([s.date, s.productName, s.category||"", s.qty, s.unitPrice, s.discount||0, s.total, s.cost||0, s.profit||0, s.payment, s.customer||"", s.notes||""]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `sales-${getSelectedMonth()}.csv`; a.click();
  URL.revokeObjectURL(url);
  showNotif("📥 CSV downloaded!");
}

          </div>`).join("")}
      </div>

      <div style="background:#0F1E35;border:1px solid #1E3A5F;border-radius:14px;padding:14px;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:#FFD700;margin-bottom:10px;">📦 Stock Overview</div>
        ${products.length === 0
          ? `<div style="color:#555;text-align:center;font-size:13px;">No products yet</div>`
          : products.sort((a,b) => (a.stock||0)-(b.stock||0)).map(p => {
              const stockClass = p.stock <= 0 ? "#E74C3C" : p.stock <= 5 ? "#E67E22" : "#27AE60";
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid #0A1628;">
                <span style="color:#ccc;">${p.name}</span>
                <span style="color:${stockClass};font-weight:700;">${p.stock||0} ${p.unit||'pcs'}</span>
              </div>`;
            }).join("")}
      </div>
    </div>`;
}

window.openAddProduct = openAddProduct;
window.openEditProduct = openEditProduct;
window.openAddSale = openAddSale;
window.openAddSaleForProduct = openAddSaleForProduct;
window.doAddProduct = doAddProduct;
window.doEditProduct = doEditProduct;

<!-- Add Product Modal -->
<div class="modal-bg" id="addProductModal" style="display:none;">

<!-- Edit Product Modal -->

<script>
// ── Modal management via renderAll ──
const origRenderAll = window.renderAll || renderAll;
function manageModals() {
  // Add Product
  const addPModal = document.getElementById("addProductModal");
  if (addPModal) addPModal.style.display = addProductOpen ? "flex" : "none";

  // Edit Product
  const editPModal = document.getElementById("editProductModal");
  if (editPModal) editPModal.style.display = editProduct ? "flex" : "none";

  // Add Sale — populate products dropdown
  const addSModal = document.getElementById("addSaleModal");
  if (addSModal) {
    addSModal.style.display = addSaleOpen ? "flex" : "none";
    if (addSaleOpen) {
      const sel = document.getElementById("sProduct");
      const currentVal = sel.value;
      sel.innerHTML = `<option value="">-- Select Product --</option>` +
        products.filter(p => (p.stock||0) > 0).map(p => `<option value="${p.id}">${p.name} (${p.stock} ${p.unit||'pcs'}) — AED ${p.sellPrice}</option>`).join("") +
        `<optgroup label="Out of Stock">` +
        products.filter(p => (p.stock||0) <= 0).map(p => `<option value="${p.id}" style="color:#888;">${p.name} — Out of Stock</option>`).join("") +
        `</optgroup>`;
      if (currentVal) sel.value = currentVal;
    }
  }
}

// Patch renderAll to also manage modals
const _origRenderAll = renderAll;
window.renderAll = function() {
  _origRenderAll();
  manageModals();
};

// Kick off initial render
if (isEditor || isViewer) renderAll();
</script>
